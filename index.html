<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Comic Sans MS",cursive;
}

body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:linear-gradient(135deg,#4F46E5,#7C3AED,#3B82F6);
background-size:400% 400%;
animation:bgMove 8s ease infinite;
overflow:hidden;
padding:15px;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
width:95%;
max-width:700px;
min-height:90vh;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
-webkit-backdrop-filter:blur(15px);
border:2px solid rgba(255,255,255,.3);
border-radius:30px;
padding:40px 25px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.left,.right{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:38px;
line-height:75px;
}

.left{
left:20px;
}

.right{
right:20px;
}

h2{
font-size:30px;
color:white;
margin-bottom:25px;
}

h1{
font-size:45px;
color:#FFD700;
margin-bottom:25px;
text-shadow:2px 2px 10px rgba(0,0,0,.3);
}

p{
font-size:26px;
color:white;
margin-bottom:40px;
}

a{
display:inline-block;
padding:15px 40px;
background:white;
color:#4F46E5;
text-decoration:none;
font-size:22px;
font-weight:bold;
border-radius:50px;
transition:.3s;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

a:hover{
transform:scale(1.08);
background:#f3f3f3;
}
</style>

</head>

<body>

<div class="container">

<div class="left">
🎉<br>
🎂<br>
🥳
</div>

<div class="right">
🎊<br>
🎁<br>
🎈
</div>

<h2>
I am so happy because<br>
today is your birthday
</h2>

<h1>
Happy Happy Birthday<br>
My Love
</h1>

<p>
There is a little surprise<br>
for you
</p>

<a href="card.html">Click Here</a>

</div>

</body>
  </html>
