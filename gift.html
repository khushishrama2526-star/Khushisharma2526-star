<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Surprise ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
overflow:hidden;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#fff;
}

.container{
text-align:center;
padding:20px;
z-index:5;
}

h1{
font-size:34px;
margin-bottom:20px;
animation:rainbow 6s linear infinite;
}

p{
font-size:22px;
margin-bottom:30px;
animation:rainbow 6s linear infinite;
}

@keyframes rainbow{
0%{color:#ff0000;}
20%{color:#ffff00;}
40%{color:#00ff00;}
60%{color:#00ffff;}
80%{color:#0066ff;}
100%{color:#ff00ff;}
}

#gift{
font-size:120px;
cursor:pointer;
transition:.5s;
animation:bounce 2s infinite;
}

#gift:hover{
transform:scale(1.15);
}

@keyframes bounce{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-15px);
}

}

#message{
display:none;
font-size:32px;
margin-top:30px;
font-weight:bold;
animation:rainbow 5s linear infinite;
}

.balloon{
position:fixed;
bottom:-150px;
font-size:45px;
animation:fly 8s linear forwards;
pointer-events:none;
}

@keyframes fly{

0%{
transform:translateY(0);
opacity:1;
}

100%{
transform:translateY(-130vh);
opacity:0;
}

}

</style>
</head>

<body>

<div class="container">

<h1>There is a little surprise for my life ❤️</h1>

<p>Tap the Gift 🎁</p>

<div id="gift">🎁</div>

<div id="message">
Happy Birthday My Love ❤️
</div>

</div>

<script>
  const gift = document.getElementById("gift");
const message = document.getElementById("message");

gift.addEventListener("click", function(){

gift.innerHTML = "📦";

message.style.display = "block";

for(let i=0;i<120;i++){

let balloon=document.createElement("div");

balloon.className="balloon";

balloon.innerHTML="🎈";

balloon.style.left=Math.random()*100+"vw";

balloon.style.animationDuration=(Math.random()*3+5)+"s";

balloon.style.fontSize=(Math.random()*25+30)+"px";

document.body.appendChild(balloon);

setTimeout(()=>{
balloon.remove();
},9000);

}

});

</script>
</body>
</html>
