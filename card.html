<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Comic Sans MS",cursive;
}

body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:linear-gradient(135deg,#4F46E5,#7C3AED,#3B82F6);
background-size:400% 400%;
animation:bg 8s ease infinite;
overflow:hidden;
padding:15px;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:95%;
max-width:700px;
min-height:90vh;
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
border-radius:30px;
padding:35px;
text-align:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
border:2px solid rgba(255,255,255,.3);
box-shadow:0 10px 30px rgba(0,0,0,.25);
}

h1{
color:#FFD700;
font-size:45px;
margin-bottom:25px;
}

.message{
color:white;
font-size:24px;
line-height:40px;
margin-bottom:40px;
}

#gift{
font-size:100px;
cursor:pointer;
transition:.4s;
animation:bounce 2s infinite;
}

#gift:hover{
transform:scale(1.1);
}

@keyframes bounce{
50%{
transform:translateY(-10px);
}
}

.tap{
margin-top:10px;
color:white;
font-size:22px;
}

#balloons{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}

.balloon{
position:absolute;
bottom:-120px;
font-size:50px;
animation:fly 6s linear forwards;
}

@keyframes fly{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}
</style>
</head>

<body>

<div id="balloons"></div>

<div class="card">

<h1>🎂 Happy Birthday My Love ❤️</h1>

<div class="message">

I am so much happy because you are my love and I choose a perfect match for me.
<br><br>
Today is not only a birthday it's a special day and I want to make it special for you.

</div>

<div id="gift">
🎁
</div>

<div class="tap">
Tap the Gift 🎁
</div>

</div>

<script src="script.js"></script>

</body>
</html>
